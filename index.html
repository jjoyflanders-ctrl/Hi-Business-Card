<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1, viewport-fit=cover" name="viewport"/>
<title>Highlight Digital Contact</title>
<link href="./manifest.webmanifest" rel="manifest"/>
<link href="./assets/icon-192.png" rel="icon"/>
<link href="./assets/icon-192.png" rel="apple-touch-icon"/>
<meta content="#3F845B" name="theme-color"/>
<meta content="yes" name="apple-mobile-web-app-capable"/>
<meta content="black-translucent" name="apple-mobile-web-app-status-bar-style"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="./styles.css?v=12" rel="stylesheet"/>
</link></head>
<body>
<a class="skip" href="#main">Skip to content</a>
<!-- DESKTOP LAYOUT -->
<header aria-label="Header (desktop)" class="desk-header" id="deskHeader">
<img alt="Highlight Industries, Inc." class="desk-banner" src="./assets/header.png"/>
<div class="desk-topbar">
<div class="search-wrap">
<label class="sr-only" for="employeeSearch">Find an employee</label>
<input autocomplete="off" id="employeeSearch" placeholder="Search employees…" type="search"/>
<div class="search-actions">
<button class="btn btn-ghost" id="openBtn" type="button">Open</button>
<button class="btn btn-ghost" id="clearBtn" title="Clear" type="button">Clear</button>
</div>
</div>
</div>
</header>
<main class="page" id="main">
<section aria-label="Digital business card (desktop)" class="desk-card" id="deskCard">
<div class="desk-left">
<h1 class="name" id="nameDesk">—</h1>
<div class="title" id="titleDesk">—</div>
<div class="rule"></div>
<div class="info">
<a class="info-row" href="#" id="emailLinkDesk">
<span aria-hidden="true" class="icon">✉️</span>
<span id="emailDesk">—</span>
</a>
<a class="info-row" href="#" id="phoneLinkDesk">
<span aria-hidden="true" class="icon">👤</span>
<span id="phoneDesk">—</span>
</a>
<a class="info-row" href="#" id="webLinkDesk" rel="noopener" target="_blank">
<span aria-hidden="true" class="icon">🌐</span>
<span id="webDesk">—</span>
</a>
</div>
<div class="desk-cta">
<button class="btn btn-primary" id="saveBtnDesk" type="button">Save to Contacts</button>
<button class="btn btn-primary" id="sendBtnDesk" type="button">Send to Phone</button>
</div>
</div>
<div class="desk-right">
<div class="photo-frame">
<img alt="" id="photoDesk"/>
</div>
</div>
</section>
<!-- MOBILE LAYOUT (forced via ?view=mobile) -->
<section aria-label="Digital business card (mobile)" class="mob-shell" id="mobShell">
<div class="mob-top">
<img alt="Highlight Industries, Inc." class="mob-logo" src="./assets/mobile-logo.png"/>
<div class="mob-photo-wrap">
<img alt="" class="mob-photo" id="photoMob"/>
</div>
</div>
<div class="mob-body">
<div class="mob-qr-wrap">
<div class="mob-qr-card">
<img alt="QR code" class="qr-img" id="qrMob"/>
</div>
</div>
<div class="mob-text">
<h1 class="mob-name" id="nameMob">—</h1>
<div class="mob-title" id="titleMob">—</div>
<div class="mob-rule"></div>
<div class="mob-info">
<a class="mob-row" href="#" id="emailLinkMob">
<span aria-hidden="true" class="mob-dot">✉️</span>
<span id="emailMob">—</span>
</a>
<a class="mob-row" href="#" id="phoneLinkMob">
<span aria-hidden="true" class="mob-dot">👤</span>
<span id="phoneMob">—</span>
</a>
<a class="mob-row" href="#" id="webLinkMob" rel="noopener" target="_blank">
<span aria-hidden="true" class="mob-dot">🌐</span>
<span id="webMob">—</span>
</a>
</div>
</div>

<div aria-label="Actions" class="mob-actionbar">

  <!-- SHARE -->
  <button aria-label="Share" class="mob-icon-btn" id="shareBtnMob" type="button">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path fill="currentColor" d="M12 3a1 1 0 0 1 1 1v8.59l2.3-2.3a1 1 0 1 1 1.4 1.42l-4.01 4a1 1 0 0 1-1.38 0l-4.01-4a1 1 0 1 1 1.4-1.42l2.3 2.3V4a1 1 0 0 1 1-1Z"/>
      <path fill="currentColor" d="M5 14a1 1 0 0 1 1 1v3h12v-3a1 1 0 1 1 2 0v3a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-3a1 1 0 0 1 1-1Z"/>
    </svg>
  </button>

  <!-- FIND -->
  <button aria-label="Find employees" class="mob-icon-btn" id="findBtnMob" type="button">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path fill="currentColor" d="M10.5 3a7.5 7.5 0 1 0 4.64 13.39l4.23 4.22a1 1 0 0 0 1.41-1.41l-4.22-4.23A7.5 7.5 0 0 0 10.5 3Zm0 2a5.5 5.5 0 1 1 0 11a5.5 5.5 0 0 1 0-11Z"/>
    </svg>
  </button>

  <!-- ADD TO CONTACTS -->
  <button aria-label="Add to Contacts" class="mob-pill-btn" id="saveBtnMob" type="button">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path fill="currentColor" d="M9 12a4 4 0 1 0-4-4a4 4 0 0 0 4 4Zm0-6a2 2 0 1 1-2 2a2 2 0 0 1 2-2Zm0 8c-3.33 0-6 1.34-6 4v1a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-1c0-2.66-2.67-4-6-4Zm-4 5c.2-1.38 2.1-3 4-3s3.8 1.62 4 3H5Zm14-8v-2a1 1 0 0 0-2 0V11h-2a1 1 0 0 0 0 2h2v2a1 1 0 0 0 2 0v-2h2a1 1 0 0 0 0-2h-2Z"/>
    </svg>
    <span>Add to Contacts</span>
  </button>

</div>

</div>
</section>
</main>
<!-- SEND TO PHONE MODAL (desktop) -->
<dialog class="modal" id="sendModal">
<form class="modal-inner" method="dialog">
<div class="modal-head">
<div class="modal-kicker">SEND TO PHONE</div>
<div class="modal-title">Share this contact</div>
<button aria-label="Close" class="modal-x" value="cancel">✕</button>
</div>
<div class="modal-grid">
<div class="qr-panel">
<div class="qr-label">Scan to open on your phone</div>
<div class="qr-box">
<img alt="QR code" class="qr-img" id="qrDesk"/>
</div>
</div>
<div class="share-panel">
<button class="btn btn-light" id="nativeShareBtn" type="button">Share (AirDrop / Messages / Mail)</button>
<button class="btn btn-light" id="copyLinkBtn" type="button">Copy Link</button>
<button class="btn btn-light" id="textLinkBtn" type="button">Text Link</button>
<button class="btn btn-light" id="emailLinkBtn" type="button">Email Link</button>
</div>
</div>
</form>
</dialog>
<!-- FIND MODAL (mobile) -->
<dialog class="modal" id="findModal">
<form class="modal-inner" method="dialog">
<div class="modal-head">
<div class="modal-kicker">FIND</div>
<div class="modal-title">Find an employee</div>
<button aria-label="Close" class="modal-x" value="cancel">✕</button>
</div>
<div class="find-body">
<label class="sr-only" for="employeeSearchMob">Search employees</label>
<input autocomplete="off" id="employeeSearchMob" placeholder="Search employees…" type="search"/>
<div class="find-results" id="findResults"></div>
</div>
</form>
</dialog>
<script defer="" src="./app.js?v=8"></script>
</body>
</html>
